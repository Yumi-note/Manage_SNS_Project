name: Redbook Tech To X Drafts

on:
  schedule:
    # 01:00 JST
    - cron: '0 16 * * *'
    # 03:00 JST
    - cron: '0 18 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate-redbook-tech-x-drafts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: global-trend-jp-publisher
    env:
      OUTPUT_DIR: data/drafts
      TARGET_LANGUAGE: ja
      DEFAULT_AUDIENCE: 日本の読者
      REDBOOK_URL_FILE: data/inputs/redbook_urls.txt

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate drafts from Redbook URL list (tech)
        run: |
          python -m global_trend_jp_publisher.cli run-from-redbook-url-list "$REDBOOK_URL_FILE" --category tech

      - name: Commit generated drafts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/drafts
          if git diff --cached --quiet; then
            echo "No updates to commit"
          else
            git commit -m "Redbook tech->X drafts $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi