name: Tech News Japanese Digest (Every 2 Hours)

on:
  schedule:
    # 00:00 JST (15:00 UTC prev day) – 毎日 0時
    - cron: '0 15 * * *'
    # 02:00 JST (17:00 UTC)
    - cron: '0 17 * * *'
    # 04:00 JST (19:00 UTC)
    - cron: '0 19 * * *'
    # 06:00 JST (21:00 UTC)
    - cron: '0 21 * * *'
    # 08:00 JST (23:00 UTC)
    - cron: '0 23 * * *'
    # 10:00 JST (01:00 UTC)
    - cron: '0 1 * * *'
    # 12:00 JST (03:00 UTC)
    - cron: '0 3 * * *'
    # 14:00 JST (05:00 UTC)
    - cron: '0 5 * * *'
    # 16:00 JST (07:00 UTC)
    - cron: '0 7 * * *'
    # 18:00 JST (09:00 UTC)
    - cron: '0 9 * * *'
    # 20:00 JST (11:00 UTC)
    - cron: '0 11 * * *'
    # 22:00 JST (13:00 UTC)
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      max_items:
        description: 'Max articles per source (default: 5)'
        required: false
        default: '5'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-tech-digest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: global-trend-jp-publisher
    env:
      OUTPUT_DIR: data/news
      TARGET_LANGUAGE: ja
      DEFAULT_AUDIENCE: 日本の読者

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Japanese tech news digest
        run: |
          MAX_ITEMS="${{ github.event.inputs.max_items || '5' }}"
          python -m global_trend_jp_publisher.cli run-tech-news \
            --sites-file data/inputs/tech_sites.txt \
            --max-items "$MAX_ITEMS" \
            --news-dir data/news

      - name: Commit generated digest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news
          if git diff --cached --quiet; then
            echo "No new articles to commit"
          else
            git commit -m "Tech news digest $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi

  deploy-pages:
    needs: generate-tech-digest
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: global-trend-jp-publisher/data/news

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
