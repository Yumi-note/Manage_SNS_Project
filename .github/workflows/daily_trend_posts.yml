name: Daily Trend Draft Generation

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate-drafts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: global-trend-jp-publisher
    env:
      RSS_FEEDS: ${{ vars.RSS_FEEDS || 'https://feeds.a.dj.com/rss/RSSMarketsMain.xml,https://www.theverge.com/rss/index.xml,https://techcrunch.com/feed/' }}
      NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY || '' }}
      MAX_ITEMS_PER_SOURCE: ${{ vars.MAX_ITEMS_PER_SOURCE || '3' }}
      OUTPUT_DIR: data/drafts
      TARGET_LANGUAGE: ja
      DEFAULT_AUDIENCE: 日本の読者

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate finance drafts
        run: python -m global_trend_jp_publisher.cli run-daily --category finance

      - name: Generate tech drafts
        run: python -m global_trend_jp_publisher.cli run-daily --category tech

      - name: Commit generated drafts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/drafts
          if git diff --cached --quiet; then
            echo "No updates to commit"
          else
            git commit -m "Daily trend drafts $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi