name: Deploy Tech News Pages

on:
  push:
    branches:
      - main
    paths:
      - 'global-trend-jp-publisher/data/news/**'
      - '.github/workflows/tech_news_pages.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: tech-news-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: global-trend-jp-publisher/data/news

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
